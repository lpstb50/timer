<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アナログタイマー</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>60分アナログタイマー</h1>

      <section class="panel" aria-label="タイマー設定">
        <label for="minutesInput">設定時間（分）</label>
        <div class="inputs">
          <input id="minutesInput" type="number" min="1" max="60" value="20" />
          <div class="range-wrap">
            <input id="minutesRange" type="range" min="1" max="60" value="20" />
            <div class="scale-labels" aria-hidden="true">
              <span>1</span>
              <span>15</span>
              <span>30</span>
              <span>45</span>
              <span>60</span>
            </div>
          </div>
        </div>
        <label class="toggle-row" for="digitalVisible">
          <input id="digitalVisible" type="checkbox" checked />
          <span>デジタル表示を表示する</span>
        </label>
      </section>

      <section class="clock-wrap" aria-label="アナログ表示">
        <canvas id="clockCanvas" width="360" height="360" aria-label="アナログタイマー表示"></canvas>
        <div class="time-text" id="timeText">20:00</div>
      </section>

      <section class="controls" aria-label="操作">
        <button id="startPauseBtn" type="button">開始</button>
        <button id="resetBtn" type="button">リセット</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
